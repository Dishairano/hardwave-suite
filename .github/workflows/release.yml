name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            for (const f of ['src-tauri/tauri.conf.json', 'package.json']) {
              const j = JSON.parse(fs.readFileSync(f));
              j.version = '${VERSION}';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
          "

      - name: Install frontend dependencies
        run: npm install

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest' && secrets.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/certificate.p12

      - name: Build Tauri (macOS with target)
        if: matrix.target != ''
        run: npm run tauri:build -- --target ${{ matrix.target }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Build Tauri (Windows/Linux)
        if: matrix.target == ''
        run: npm run tauri:build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb

  update-manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate and upload updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          REPO="Dishairano/hardwave-suite"
          BASE="https://github.com/${REPO}/releases/download/${TAG}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(gh release view "${TAG}" --json body -q '.body' 2>/dev/null || echo "Bug fixes and improvements")

          # Fetch signatures from release assets
          mkdir -p /tmp/sigs /tmp/sigs-mac /tmp/sigs-linux
          WIN_SIG=$(gh release download "${TAG}" -p "*.exe.sig" -D /tmp/sigs 2>/dev/null && cat /tmp/sigs/*.exe.sig || echo "")
          MAC_SIG=$(gh release download "${TAG}" -p "*.app.tar.gz.sig" -D /tmp/sigs-mac 2>/dev/null && cat /tmp/sigs-mac/*.app.tar.gz.sig || echo "")
          LINUX_SIG=$(gh release download "${TAG}" -p "*.AppImage.sig" -D /tmp/sigs-linux 2>/dev/null && cat /tmp/sigs-linux/*.AppImage.sig || echo "")

          # Build latest.json
          python3 -c "
          import json, sys
          notes = '''${NOTES}'''
          manifest = {
            'version': '${VERSION}',
            'notes': notes.strip() if notes.strip() else 'Bug fixes and improvements',
            'pub_date': '${DATE}',
            'platforms': {
              'windows-x86_64': {
                'signature': '''${WIN_SIG}''',
                'url': '${BASE}/Hardwave.Suite_${VERSION}_x64-setup.exe'
              },
              'darwin-aarch64': {
                'signature': '''${MAC_SIG}''',
                'url': '${BASE}/Hardwave.Suite.app.tar.gz'
              },
              'linux-x86_64': {
                'signature': '''${LINUX_SIG}''',
                'url': '${BASE}/Hardwave.Suite_${VERSION}_amd64.AppImage'
              }
            }
          }
          with open('/tmp/latest.json', 'w') as f:
            json.dump(manifest, f, indent=2)
          "

          # Upload as release asset (serves as updater endpoint)
          gh release upload "${TAG}" /tmp/latest.json --clobber
