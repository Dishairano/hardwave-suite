name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows
          - platform: macos-latest
            target: aarch64-apple-darwin
            name: macos
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: linux

    runs-on: ${{ matrix.platform }}
    name: Build (${{ matrix.name }})

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install deps (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libasound2-dev

      - run: npm ci

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD || secrets.TAURI_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Upload artifacts (Windows)
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.nsis.zip.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi.zip.sig

      - name: Upload artifacts (macOS)
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload artifacts (Linux)
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage.tar.gz.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten artifacts
        run: |
          mkdir -p release-files
          find artifacts -type f \( -name "*.exe" -o -name "*.msi" -o -name "*.dmg" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.tar.gz" -o -name "*.sig" -o -name "*.zip" \) -exec cp {} release-files/ \;
          # Normalize spaces so release asset names and URLs are stable.
          find release-files -maxdepth 1 -type f | while IFS= read -r file; do
            base="$(basename "$file")"
            normalized="${base// /.}"
            if [ "$base" != "$normalized" ]; then
              mv "$file" "release-files/$normalized"
            fi
          done
          ls -la release-files/

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./src-tauri/tauri.conf.json').version")" >> $GITHUB_OUTPUT

      - name: Generate latest.json
        run: |
          set -euo pipefail

          VERSION="${{ steps.pkg.outputs.version }}"
          TAG="${{ steps.version.outputs.tag }}"
          NOTES="Bug fixes and improvements"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/Dishairano/hardwave-suite/releases/download/${TAG}"

          pick_file() {
            local pattern="$1"
            find release-files -maxdepth 1 -type f -iname "$pattern" -printf '%f\n' | sort | head -n 1
          }

          read_sig() {
            local file="$1"
            if [ -z "$file" ] || [ ! -f "release-files/${file}.sig" ]; then
              echo ""
              return
            fi
            tr -d '\r\n' < "release-files/${file}.sig"
          }

          WIN_FILE="$(pick_file '*.nsis.zip')"
          MAC_FILE="$(pick_file '*.app.tar.gz')"
          LINUX_FILE="$(pick_file '*.AppImage.tar.gz')"

          WIN_SIG="$(read_sig "$WIN_FILE")"
          MAC_SIG="$(read_sig "$MAC_FILE")"
          LINUX_SIG="$(read_sig "$LINUX_FILE")"

          missing=0
          for required in WIN_FILE MAC_FILE LINUX_FILE WIN_SIG MAC_SIG LINUX_SIG; do
            if [ -z "${!required}" ]; then
              echo "::error::Missing ${required} while generating latest.json"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "release-files contents:"
            find release-files -maxdepth 1 -type f -printf '%f\n' | sort
            exit 1
          fi

          jq -n \
            --arg version "$VERSION" \
            --arg notes "$NOTES" \
            --arg pub_date "$PUB_DATE" \
            --arg win_sig "$WIN_SIG" \
            --arg mac_sig "$MAC_SIG" \
            --arg linux_sig "$LINUX_SIG" \
            --arg win_url "${BASE_URL}/${WIN_FILE}" \
            --arg mac_url "${BASE_URL}/${MAC_FILE}" \
            --arg linux_url "${BASE_URL}/${LINUX_FILE}" \
            '{
              version: $version,
              notes: $notes,
              pub_date: $pub_date,
              platforms: {
                "windows-x86_64": {
                  signature: $win_sig,
                  url: $win_url
                },
                "darwin-aarch64": {
                  signature: $mac_sig,
                  url: $mac_url
                },
                "linux-x86_64": {
                  signature: $linux_sig,
                  url: $linux_url
                }
              }
            }' > latest.json

          echo "Generated latest.json:"
          cat latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Hardwave Suite ${{ steps.version.outputs.tag }}
          draft: false
          prerelease: false
          files: |
            release-files/*
            latest.json
          body: |
            ## Hardwave Suite ${{ steps.version.outputs.tag }}

            Production toolkit for hardstyle, rawstyle, and hardcore producers.

            ### Downloads
            - **Windows**: `.exe` installer
            - **macOS**: `.dmg` (Apple Silicon)
            - **Linux**: `.AppImage` or `.deb`

            ### Auto-Updates
            This release supports automatic updates. The app will notify you when new versions are available.
