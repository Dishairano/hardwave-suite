name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: ''
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: ubuntu-22.04
            target: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev \
            patchelf libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev

      - name: Set version from tag
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            for (const f of ['src-tauri/tauri.conf.json', 'package.json']) {
              const j = JSON.parse(fs.readFileSync(f));
              j.version = '${VERSION}';
              fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
            }
          "

      - name: Install frontend dependencies
        run: npm install

      - name: Import Apple certificate
        if: matrix.platform == 'macos-latest' && env.APPLE_CERTIFICATE != ''
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE" | base64 --decode > /tmp/certificate.p12
          security create-keychain -p actions build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain
          security import /tmp/certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions build.keychain
          rm /tmp/certificate.p12

      - name: Build Tauri
        shell: bash
        run: |
          if [ -n "${{ matrix.target }}" ]; then
            npm run tauri:build -- --target ${{ matrix.target }}
          else
            npm run tauri:build
          fi
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Sign Windows binaries
        if: matrix.platform == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        env:
          WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: powershell
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE)
          $certPath = Join-Path $env:RUNNER_TEMP "certificate.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)

          $cert = Import-PfxCertificate -FilePath $certPath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password (ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -AsPlainText -Force)
          $thumbprint = $cert.Thumbprint

          # Sign all .exe and .msi files in the bundle directory
          Get-ChildItem -Path src-tauri/target/release/bundle -Recurse -Include *.exe,*.msi | ForEach-Object {
            & signtool sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /sha1 $thumbprint $_.FullName
            Write-Output "Signed: $($_.Name)"
          }

          Remove-Item $certPath -Force

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/nsis/*.exe.sig
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msi/*.msi.sig

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app.tar.gz.sig

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/appimage/*.AppImage.sig
            src-tauri/target/release/bundle/deb/*.deb

  deploy-update:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          mkdir -p /tmp/release-assets /tmp/sigs /tmp/sigs-mac /tmp/sigs-linux

          # Download updater binaries + signatures
          gh release download "${TAG}" -p "*.exe" -p "*.exe.sig" -D /tmp/release-assets 2>/dev/null || true
          gh release download "${TAG}" -p "*.app.tar.gz" -p "*.app.tar.gz.sig" -D /tmp/release-assets 2>/dev/null || true
          gh release download "${TAG}" -p "*.AppImage" -p "*.AppImage.sig" -D /tmp/release-assets 2>/dev/null || true

          ls -la /tmp/release-assets/

      - name: Generate updater manifest
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE="https://hardwavestudios.com/downloads/suite"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NOTES=$(gh release view "${TAG}" --json body -q '.body' 2>/dev/null || echo "Bug fixes and improvements")

          # Read signatures from downloaded assets
          WIN_SIG=$(cat /tmp/release-assets/*.exe.sig 2>/dev/null || echo "")
          MAC_SIG=$(cat /tmp/release-assets/*.app.tar.gz.sig 2>/dev/null || echo "")
          LINUX_SIG=$(cat /tmp/release-assets/*.AppImage.sig 2>/dev/null || echo "")

          # Build latest.json with hardwavestudios.com URLs
          python3 -c "
          import json
          manifest = {
            'version': '${VERSION}',
            'notes': '''${NOTES}'''.strip() or 'Bug fixes and improvements',
            'pub_date': '${DATE}',
            'platforms': {
              'windows-x86_64': {
                'signature': '''${WIN_SIG}''',
                'url': '${BASE}/Hardwave.Suite_${VERSION}_x64-setup.exe'
              },
              'darwin-aarch64': {
                'signature': '''${MAC_SIG}''',
                'url': '${BASE}/Hardwave.Suite.app.tar.gz'
              },
              'linux-x86_64': {
                'signature': '''${LINUX_SIG}''',
                'url': '${BASE}/Hardwave.Suite_${VERSION}_amd64.AppImage'
              }
            }
          }
          with open('/tmp/latest.json', 'w') as f:
            json.dump(manifest, f, indent=2)
          "

          cat /tmp/latest.json

          # Also upload to GitHub release as asset
          gh release upload "${TAG}" /tmp/latest.json --clobber

      - name: Deploy to hardwavestudios.com
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          # Set up SSH
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H 46.225.219.184 >> ~/.ssh/known_hosts 2>/dev/null

          REMOTE="root@46.225.219.184"
          SSH="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"
          SCP="scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no"

          # Create release directory on server
          $SSH $REMOTE "mkdir -p /opt/hardwave/public-downloads/suite-releases"

          # Upload binaries (only updater-relevant files: .exe, .app.tar.gz, .AppImage + sigs)
          $SCP /tmp/release-assets/* $REMOTE:/opt/hardwave/public-downloads/suite-releases/

          # Upload manifest
          $SCP /tmp/latest.json $REMOTE:/opt/hardwave/public-downloads/hardwave-suite-latest.json

          echo "Deployed to hardwavestudios.com"

          # Clean up
          rm -f ~/.ssh/deploy_key
