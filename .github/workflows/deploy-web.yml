name: Deploy Web App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Deploy to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: 178.104.2.34
          username: root
          password: ${{ secrets.DEPLOY_SERVER_PASSWORD }}
          source: dist/*
          target: /var/www/hardwave-app
          strip_components: 1
