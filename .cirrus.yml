env:
  GITHUB_TOKEN: ENCRYPTED[${GITHUB_TOKEN}]

task:
  name: Create Release
  only_if: $CIRRUS_TAG =~ 'v.*'
  container:
    image: ubuntu:22.04
  setup_script:
    - apt-get update && apt-get install -y curl
    - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
    - apt-get update && apt-get install -y gh
  create_script:
    - |
      gh release create "${CIRRUS_TAG}" \
        --title "Hardwave Suite ${CIRRUS_TAG}" \
        --generate-notes \
        --repo "${CIRRUS_REPO_FULL_NAME}" || true

task:
  name: Build Linux (x86_64)
  depends_on:
    - Create Release
  only_if: $CIRRUS_TAG =~ 'v.*'
  container:
    image: ubuntu:22.04
    cpu: 4
    memory: 8G
  env:
    DEBIAN_FRONTEND: noninteractive
  setup_script:
    - apt-get update && apt-get install -y curl wget build-essential pkg-config
        libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libssl-dev
        libgtk-3-dev libglib2.0-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev
        patchelf file
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y nodejs
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - . "$HOME/.cargo/env" && rustup default stable
  version_script:
    - |
      VERSION="${CIRRUS_TAG#v}"
      node -e "
        const fs = require('fs');
        for (const f of ['src-tauri/tauri.conf.json', 'package.json']) {
          const j = JSON.parse(fs.readFileSync(f));
          j.version = '${VERSION}';
          fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
        }
      "
  install_script:
    - npm install
  build_script:
    - . "$HOME/.cargo/env" && npx tauri build
  upload_script:
    - |
      apt-get install -y gh 2>/dev/null || (curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null && apt-get update && apt-get install -y gh)
      gh release upload "${CIRRUS_TAG}" \
        src-tauri/target/release/bundle/appimage/*.AppImage \
        src-tauri/target/release/bundle/appimage/*.AppImage.sig \
        src-tauri/target/release/bundle/deb/*.deb \
        --clobber --repo "${CIRRUS_REPO_FULL_NAME}" || true

task:
  name: Build Windows (x86_64)
  depends_on:
    - Create Release
  only_if: $CIRRUS_TAG =~ 'v.*'
  windows_container:
    image: cirrusci/windowsservercore:2022
    cpu: 4
    memory: 8G
  env:
    CIRRUS_SHELL: powershell
  setup_script:
    - choco install -y nodejs-lts rust-ms visualstudio2022buildtools --package-parameters "--add Microsoft.VisualStudio.Workload.VCTools --includeRecommended"
    - refreshenv
  version_script:
    - |
      $VERSION = $env:CIRRUS_TAG -replace '^v', ''
      node -e "
        const fs = require('fs');
        for (const f of ['src-tauri/tauri.conf.json', 'package.json']) {
          const j = JSON.parse(fs.readFileSync(f));
          j.version = '$VERSION';
          fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
        }
      "
  install_script:
    - npm install
  build_script:
    - npx tauri build
  upload_script:
    - |
      gh release upload "$env:CIRRUS_TAG" `
        (Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe).FullName `
        (Get-ChildItem -Path src-tauri/target/release/bundle/nsis -Filter *.exe.sig).FullName `
        --clobber --repo "$env:CIRRUS_REPO_FULL_NAME"

task:
  name: Build macOS (aarch64)
  depends_on:
    - Create Release
  only_if: $CIRRUS_TAG =~ 'v.*'
  macos_instance:
    image: ghcr.io/cirruslabs/macos-runner:sonoma
  setup_script:
    - brew install node@20
    - echo 'export PATH="/opt/homebrew/opt/node@20/bin:$PATH"' >> ~/.zshrc
    - source ~/.zshrc
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    - . "$HOME/.cargo/env" && rustup target add aarch64-apple-darwin x86_64-apple-darwin
  version_script:
    - |
      export PATH="/opt/homebrew/opt/node@20/bin:$PATH"
      VERSION="${CIRRUS_TAG#v}"
      node -e "
        const fs = require('fs');
        for (const f of ['src-tauri/tauri.conf.json', 'package.json']) {
          const j = JSON.parse(fs.readFileSync(f));
          j.version = '${VERSION}';
          fs.writeFileSync(f, JSON.stringify(j, null, 2) + '\n');
        }
      "
  install_script:
    - export PATH="/opt/homebrew/opt/node@20/bin:$PATH"
    - npm install
  build_aarch64_script:
    - export PATH="/opt/homebrew/opt/node@20/bin:$PATH"
    - . "$HOME/.cargo/env"
    - npx tauri build --target aarch64-apple-darwin
  build_x86_64_script:
    - export PATH="/opt/homebrew/opt/node@20/bin:$PATH"
    - . "$HOME/.cargo/env"
    - npx tauri build --target x86_64-apple-darwin
  upload_script:
    - |
      export PATH="/opt/homebrew/opt/node@20/bin:$PATH"
      brew install gh
      gh release upload "${CIRRUS_TAG}" \
        src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg \
        src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz \
        src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig \
        src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg \
        src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz \
        src-tauri/target/x86_64-apple-darwin/release/bundle/macos/*.app.tar.gz.sig \
        --clobber --repo "${CIRRUS_REPO_FULL_NAME}" || true

task:
  name: Update manifest
  only_if: $CIRRUS_TAG =~ 'v.*'
  depends_on:
    - Build Linux (x86_64)
    - Build Windows (x86_64)
    - Build macOS (aarch64)
  container:
    image: ubuntu:22.04
  setup_script:
    - apt-get update && apt-get install -y curl python3
    - curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null
    - apt-get update && apt-get install -y gh
  manifest_script:
    - |
      VERSION="${CIRRUS_TAG#v}"
      TAG="${CIRRUS_TAG}"
      REPO="${CIRRUS_REPO_FULL_NAME}"
      BASE="https://github.com/${REPO}/releases/download/${TAG}"
      DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      NOTES=$(gh release view "${TAG}" --json body -q '.body' --repo "${REPO}" 2>/dev/null || echo "Bug fixes and improvements")

      mkdir -p /tmp/sigs /tmp/sigs-mac /tmp/sigs-linux
      WIN_SIG=$(gh release download "${TAG}" -p "*.exe.sig" -D /tmp/sigs --repo "${REPO}" 2>/dev/null && cat /tmp/sigs/*.exe.sig || echo "")
      MAC_SIG=$(gh release download "${TAG}" -p "*.app.tar.gz.sig" -D /tmp/sigs-mac --repo "${REPO}" 2>/dev/null && cat /tmp/sigs-mac/*.app.tar.gz.sig || echo "")
      LINUX_SIG=$(gh release download "${TAG}" -p "*.AppImage.sig" -D /tmp/sigs-linux --repo "${REPO}" 2>/dev/null && cat /tmp/sigs-linux/*.AppImage.sig || echo "")

      python3 -c "
      import json
      manifest = {
        'version': '${VERSION}',
        'notes': '''${NOTES}'''.strip() or 'Bug fixes and improvements',
        'pub_date': '${DATE}',
        'platforms': {
          'windows-x86_64': {
            'signature': '''${WIN_SIG}''',
            'url': '${BASE}/Hardwave.Suite_${VERSION}_x64-setup.exe'
          },
          'darwin-aarch64': {
            'signature': '''${MAC_SIG}''',
            'url': '${BASE}/Hardwave.Suite.app.tar.gz'
          },
          'linux-x86_64': {
            'signature': '''${LINUX_SIG}''',
            'url': '${BASE}/Hardwave.Suite_${VERSION}_amd64.AppImage'
          }
        }
      }
      with open('/tmp/latest.json', 'w') as f:
        json.dump(manifest, f, indent=2)
      "
      gh release upload "${TAG}" /tmp/latest.json --clobber --repo "${REPO}"
